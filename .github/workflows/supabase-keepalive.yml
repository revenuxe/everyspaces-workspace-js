name: Supabase keepalive

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase health endpoint
        env:
          KEEPALIVE_URL: ${{ secrets.EVERYSPACES_KEEPALIVE_URL }}
        run: |
          URL="${KEEPALIVE_URL:-https://www.everyspaces.com/api/health/supabase}"
          curl --fail --silent --show-error --max-time 30 "$URL"
